name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build -c release
      - name: Test
        # На раннерах стоит полный Xcode, обёртка test.sh (для CLT) не нужна
        run: swift test
